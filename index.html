<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMZ Prep — DTC Pricing Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        #6495ED;
      --blue-dark:   #4a7fd4;
      --blue-glow:   rgba(100,149,237,0.15);
      --navy:        #0a0e1a;
      --navy-mid:    #111827;
      --navy-card:   #1a2235;
      --navy-border: #2a3550;
      --white:       #ffffff;
      --text:        #e2e8f0;
      --muted:       #94a3b8;
      --dim:         #64748b;
      --input-bg:    #1e2d47;
      --input-border:#2e4060;
    }

    body {
      background: var(--navy);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 0;
    }

    /* ── Top nav bar ── */
    .topbar {
      width: 100%;
      background: var(--navy-mid);
      border-bottom: 1px solid var(--navy-border);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-logo {
      height: 26px;
      filter: invert(1) brightness(2);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-tag {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--dim);
      text-transform: uppercase;
    }

    .topbar-badge {
      background: rgba(100,149,237,0.15);
      border: 1px solid rgba(100,149,237,0.3);
      color: var(--blue);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #0d1526 0%, #111d35 50%, #0a1420 100%);
      border-bottom: 1px solid var(--navy-border);
      padding: 56px 40px 48px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(100,149,237,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    .hero-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--blue);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .hero h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 800;
      line-height: 1.1;
      color: var(--white);
      letter-spacing: -0.5px;
    }

    .hero h1 span { color: var(--blue); }

    .hero-sub {
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
    }

    .hero-logo-block {
      text-align: right;
      flex-shrink: 0;
    }

    .hero-logo {
      height: 20px;
      filter: invert(1) brightness(2);
      opacity: 0.4;
      display: block;
      margin-left: auto;
      margin-bottom: 6px;
    }

    .hero-url {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 1px;
    }

    /* ── Main ── */
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 44px 40px 80px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--blue);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ── Quantity display cards ── */
    .qty-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 44px;
    }

    .qty-card {
      background: var(--navy-card);
      border: 1px solid var(--navy-border);
      border-radius: 10px;
      padding: 20px 22px;
    }

    .qty-card-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .qty-card-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.5px;
    }

    /* ── Table card ── */
    .table-card {
      background: var(--navy-card);
      border: 1px solid var(--navy-border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .table-card-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--navy-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .table-card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
    }

    .table-card-count {
      font-size: 11px;
      color: var(--dim);
      background: rgba(255,255,255,0.05);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--navy-border);
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr { border-bottom: 1px solid var(--navy-border); }

    th {
      font-size: 11px;
      font-weight: 500;
      color: var(--dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 12px 24px;
      text-align: left;
    }

    th.th-center { text-align: center; }
    th.th-right  { text-align: right; }
    th:last-child { text-align: right; }

    tbody tr {
      border-bottom: 1px solid rgba(42,53,80,0.6);
      transition: background 0.12s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,0.02); }

    td {
      padding: 15px 24px;
      font-size: 13px;
      color: var(--text);
      vertical-align: middle;
    }

    td:first-child  { font-weight: 500; color: var(--white); }
    td.td-center    { text-align: center; color: var(--muted); }
    td.td-right     { text-align: right; color: var(--muted); }
    td.td-total     { text-align: right; color: var(--blue); font-weight: 600; font-size: 14px; }
    td.td-zero      { text-align: right; color: var(--navy-border); }

    /* ── Summary cards ── */
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 24px;
    }

    .card { padding: 28px 32px; border-radius: 12px; }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .card-value {
      font-size: clamp(28px, 4vw, 38px);
      font-weight: 800;
      letter-spacing: -1px;
    }

    .card-subtotal {
      background: var(--navy-card);
      border: 1px solid var(--navy-border);
    }
    .card-subtotal .card-label { color: var(--muted); }
    .card-subtotal .card-value { color: var(--white); }

    .card-per-order {
      background: linear-gradient(135deg, #0f1a2e, #101828);
      border: 1px solid rgba(100,149,237,0.3);
      position: relative;
      overflow: hidden;
    }
    .card-per-order::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 150px; height: 150px;
      background: radial-gradient(circle, rgba(100,149,237,0.1) 0%, transparent 70%);
    }
    .card-per-order .card-label { color: rgba(100,149,237,0.7); position: relative; }
    .card-per-order .card-value { color: var(--blue); position: relative; }

    /* ── Footer ── */
    .footer {
      margin-top: 60px;
      padding-top: 28px;
      border-top: 1px solid var(--navy-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-text {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 1px;
    }

    .footer-logo {
      height: 15px;
      filter: invert(1) brightness(2);
      opacity: 0.2;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero       { animation: fadeDown 0.5s ease both; }
    .qty-grid   { animation: fadeUp 0.5s ease 0.1s both; }
    .table-card { animation: fadeUp 0.5s ease 0.15s both; }
    .summary    { animation: fadeUp 0.5s ease 0.2s both; }

    @media (max-width: 640px) {
      .topbar { padding: 0 20px; }
      .hero   { padding: 36px 20px 32px; }
      .main   { padding: 32px 20px 60px; }
      th, td  { padding: 12px 14px; }
      .summary { grid-template-columns: 1fr; }
      .hero-logo-block { display: none; }
      .topbar-badge { display: none; }
    }
  </style>
</head>
<body>

  <!-- Top nav -->
  <div class="topbar">
    <img class="topbar-logo"
      src="https://raw.githubusercontent.com/abishek-oss/dtc-pricing-calculator/main/amzprepwonglobalclutchchampionsawards1156358703.png"
      alt="AMZ Prep" />
    <div class="topbar-right">
      <span class="topbar-tag">DTC Pricing</span>
      <span class="topbar-badge">Fee Estimate</span>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-inner">
      <div>
        <div class="hero-eyebrow">DTC Details Fee</div>
        <h1>Pricing <span>Calculator</span></h1>
        <p class="hero-sub">Your estimated DTC fulfillment costs based on your order volume.</p>
      </div>
      <div class="hero-logo-block">
        <img class="hero-logo"
          src="https://raw.githubusercontent.com/abishek-oss/dtc-pricing-calculator/main/amzprepwonglobalclutchchampionsawards1156358703.png"
          alt="AMZ Prep" />
        <span class="hero-url">amzprep.com</span>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Quantity display -->
    <div class="section-title">Your Volume</div>
    <div class="qty-grid" id="qtyGrid">
      <!-- populated by JS -->
    </div>

    <!-- Line items -->
    <div class="section-title">Fee Breakdown</div>
    <div class="table-card">
      <div class="table-card-header">
        <span class="table-card-title">Line Items</span>
        <span class="table-card-count" id="lineCount">— items</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Service</th>
            <th class="th-center">Quantity</th>
            <th class="th-right">Unit Price</th>
            <th class="th-right">Total</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- populated by JS -->
        </tbody>
      </table>
    </div>

    <!-- Summary -->
    <div class="summary">
      <div class="card card-subtotal">
        <div class="card-label">Subtotal</div>
        <div class="card-value" id="subtotal">—</div>
      </div>
      <div class="card card-per-order">
        <div class="card-label">Cost Per Order</div>
        <div class="card-value" id="perOrder">—</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-text">All figures in USD &nbsp;·&nbsp; AMZ Prep &nbsp;·&nbsp; amzprep.com</span>
      <img class="footer-logo"
        src="https://raw.githubusercontent.com/abishek-oss/dtc-pricing-calculator/main/amzprepwonglobalclutchchampionsawards1156358703.png"
        alt="AMZ Prep" />
    </div>

  </div>

  <!-- Load config first, then run calculator -->
  <script src="config.js"></script>
  <script>
    const fmt = n => n.toLocaleString('en-US', { style: 'currency', currency: 'USD' });

function build() {
  // Build a lookup map from CONFIG.quantities: { key -> value }
  const qtyMap = {};
  CONFIG.quantities.forEach(q => { qtyMap[q.key] = q.value; });

  // Build quantity cards (only visible ones)
  const qtyGrid = document.getElementById('qtyGrid');
  CONFIG.quantities
    .filter(q => q.show !== false)
    .forEach(q => {
      qtyGrid.innerHTML += `
        <div class="qty-card">
          <div class="qty-card-label">${q.label}</div>
          <div class="qty-card-value">${q.value.toLocaleString()}</div>
        </div>`;
    });

  // Build line items table (only visible ones)
  const items = CONFIG.lineItems.filter(i => i.show !== false);
  document.getElementById('lineCount').textContent = `${items.length} items`;

  let subtotal = 0;
  const tbody = document.getElementById('tableBody');

  items.forEach(item => {
    const qty   = qtyMap[item.qtyKey] ?? 0;
    const total = qty * item.rate;
    subtotal += total;

    tbody.innerHTML += `
      <tr>
        <td>${item.label}</td>
        <td class="td-center">${qty.toLocaleString()}</td>
        <td class="td-right">${fmt(item.rate)}</td>
        <td class="${total > 0 ? 'td-total' : 'td-zero'}">${fmt(total)}</td>
      </tr>`;
  });

  // Cost per order uses the "Shipping" quantity as the order count
  const orderQty = qtyMap['Shipping'] ?? 0;
  const perOrder = orderQty > 0 ? subtotal / orderQty : 0;
  document.getElementById('subtotal').textContent = fmt(subtotal);
  document.getElementById('perOrder').textContent = fmt(perOrder);
}

build();
  </script>
</body>
</html>
